# Standalone FlashCache (TCP + Prometheus text metrics).
# docker compose -f flashcache/docker-compose.yml up -d --build

services:
  flashcache:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: flashcache-node
    ports:
      - "${FLASHCACHE_PORT:-7654}:7654"
      - "${FLASHCACHE_METRICS_PORT:-7655}:7655"
    environment:
      FLASHCACHE_PORT: "7654"
      FLASHCACHE_METRICS_PORT: "7655"
      FLASHCACHE_MAX_KEYS: "500000"
